name: CI / test-and-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install

      - name: pnpm check
        run: pnpm check
        # Or: pnpm lint — change the command above if you prefer lint-only.

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check (workspace)
        run: cargo check --workspace
