name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal read-only permissions. Jobs that need more (e.g. upload artifacts)
# should declare them explicitly at the job level.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel in-progress runs for the same ref when a new push arrives.
# This keeps PR queues fast and avoids burning macOS runner minutes on
# superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Lint (fmt + clippy) — Linux, ~2–3 min ─────────────────────────────
  #
  # Required status check name: "Lint (fmt + clippy)"
  #
  # Fast gate. Catches formatting and correctness issues before the heavier
  # jobs run. --all-targets includes lib, bins, tests, and bench targets so
  # clippy also checks #[cfg(test)] blocks.
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Swatinem/rust-cache handles ~/.cargo/registry, ~/.cargo/git, and the
      # target/ directory with fine-grained invalidation. prefix-key keeps
      # lint and test caches separate so a test rebuild doesn't bust the lint
      # incremental cache and vice-versa.
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-lint

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets
        run: cargo clippy --all-targets -- -D warnings

  # ── 2. Rust tests — Linux, ~3–5 min ──────────────────────────────────────
  #
  # Required status check name: "Rust tests"
  #
  # Runs the two test packages. oxcer-core covers unit + integration tests for
  # the pure-Rust library. oxcer_ffi covers FFI contract tests and catches stale
  # #[cfg(test)] code referencing wrong return types (root cause of the 88 GB VM
  # incident).
  #
  # desktop-tauri/src-tauri is checked by `cargo check --workspace` but its tests
  # are not run here — it has no meaningful tests and depends on Tauri internals
  # that are awkward to test in a headless CI environment.
  test:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-test

      # Workspace-wide type + borrow check. Catches compile errors in all
      # crates including desktop-tauri before running the slower test step.
      - name: cargo check --workspace
        run: cargo check --workspace --locked

      - name: cargo test (oxcer-core)
        run: cargo test --locked -p oxcer-core

      - name: cargo test (oxcer_ffi)
        run: cargo test --locked -p oxcer_ffi

  # ── 3. macOS build + FFI bindings — macOS, ~10–15 min cold ───────────────
  #
  # Required status check name: "macOS build & FFI bindings"
  #
  # Runs after both Linux jobs pass. macOS-only because:
  #   • llama-cpp-sys requires cmake and pulls the llama.cpp + Metal headers
  #   • Xcode and the Swift toolchain are macOS-only
  #   • UniFFI binding freshness check requires the release dylib
  #
  # The dylib is built once and reused by both the Xcode build step and the
  # FFI freshness check, avoiding a second cmake + cargo build.
  #
  # This is the most expensive job. It is intentionally gated behind the Linux
  # jobs so macOS runner minutes are not consumed when fmt/clippy/tests fail.
  macos:
    name: macOS build & FFI bindings
    runs-on: macos-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-macos

      # brew install is idempotent. cmake is often pre-installed on the
      # GitHub macOS runner but the version may be too old for llama-cpp-sys
      # (requires ≥ 3.14). This ensures the right version is available.
      - name: Install cmake (required by llama-cpp-sys)
        run: brew install cmake

      # Build the release dylib once. Steps 3a and 3b both depend on it.
      # --locked ensures Cargo.lock is respected (no silent dep upgrades in CI).
      - name: Build oxcer_ffi dylib (release)
        run: cargo build --locked --release -p oxcer_ffi

      # ── 3a. Xcode build ──────────────────────────────────────────────────
      - name: Build OxcerLauncher (Xcode)
        run: |
          xcodebuild \
            -project apps/OxcerLauncher/OxcerLauncher.xcodeproj \
            -scheme OxcerLauncher \
            -destination 'platform=macOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      # ── 3b. UniFFI binding freshness ─────────────────────────────────────
      #
      # Regenerates Swift bindings from the release dylib we just built, then
      # diffs against the two committed generated files:
      #
      #   oxcer_ffi.swift   — Swift API wrappers
      #   oxcer_ffiFFI.h    — C declarations imported by the bridging header
      #
      # Both must stay in sync with the Rust source. Divergence here means a
      # Rust FFI signature was changed without running ./scripts/regen-ffi.sh.
      # The header divergence was the root cause of "Cannot find
      # uniffi_oxcer_ffi_fn_func_* in scope" build errors.
      #
      # Fix for a failure: run ./scripts/regen-ffi.sh and commit both files.
      - name: Generate fresh Swift bindings
        run: |
          mkdir -p /tmp/uniffi_fresh
          cargo run --bin uniffi-bindgen -- generate \
            --library target/release/liboxcer_ffi.dylib \
            --language swift \
            --out-dir /tmp/uniffi_fresh

      - name: Verify oxcer_ffi.swift is up-to-date
        run: |
          COMMITTED=apps/OxcerLauncher/OxcerLauncher/oxcer_ffi.swift
          FRESH=/tmp/uniffi_fresh/oxcer_ffi.swift
          if ! diff -q "$FRESH" "$COMMITTED" > /dev/null 2>&1; then
            echo ""
            echo "ERROR: oxcer_ffi.swift is STALE."
            echo "  The committed Swift bindings do not match what uniffi-bindgen"
            echo "  would produce from the current Rust source."
            echo ""
            echo "  Fix: run ./scripts/regen-ffi.sh and commit both generated files."
            echo ""
            diff "$FRESH" "$COMMITTED" || true
            exit 1
          fi
          echo "OK: oxcer_ffi.swift matches the Rust source."

      - name: Verify oxcer_ffiFFI.h is up-to-date
        run: |
          COMMITTED=apps/OxcerLauncher/OxcerLauncher/oxcer_ffiFFI.h
          FRESH=/tmp/uniffi_fresh/oxcer_ffiFFI.h
          if ! diff -q "$FRESH" "$COMMITTED" > /dev/null 2>&1; then
            echo ""
            echo "ERROR: oxcer_ffiFFI.h is STALE."
            echo "  The committed C bridging header does not match what uniffi-bindgen"
            echo "  would produce from the current Rust source."
            echo ""
            echo "  Fix: run ./scripts/regen-ffi.sh and commit both generated files."
            echo ""
            diff "$FRESH" "$COMMITTED" || true
            exit 1
          fi
          echo "OK: oxcer_ffiFFI.h matches the Rust source."
