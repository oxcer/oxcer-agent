name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Lint (fast, Linux) ───────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy -- -D warnings
        run: cargo clippy -- -D warnings

  # ── Job 2: Rust tests (fast, Linux) ────────────────────────────────────────
  test:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: cargo check (workspace)
        run: cargo check --workspace

      - name: cargo test (oxcer-core)
        # Core unit + integration tests. No Tauri dependency; pure Rust.
        run: cargo test -p oxcer-core

      - name: cargo test (oxcer_ffi)
        # FFI contract tests. Catches stale #[cfg(test)] referencing wrong return types.
        run: cargo test -p oxcer_ffi

  # ── Job 3: macOS build (dylib + Xcode) ────────────────────────────────────
  macos-build:
    name: macOS app build
    runs-on: macos-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-macos-

      - name: Install cmake (required by llama-cpp-sys)
        run: brew install cmake

      - name: Build oxcer_ffi dylib (release)
        run: cargo build --release -p oxcer_ffi

      - name: Build OxcerLauncher (Xcode)
        run: |
          xcodebuild \
            -project apps/OxcerLauncher/OxcerLauncher.xcodeproj \
            -scheme OxcerLauncher \
            -destination 'platform=macOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

  # ── Job 4: UniFFI binding freshness (macOS) ────────────────────────────────
  #
  # Ensures the committed oxcer_ffi.swift exactly matches what uniffi-bindgen
  # would produce from the current Rust source. A divergence means a Rust FFI
  # signature was changed without regenerating the Swift bindings — the root
  # cause of the 88 GB virtual-memory incident.
  #
  # To fix a failure here: run ./scripts/regen-ffi.sh
  uniffi-binding-freshness:
    name: UniFFI binding freshness
    runs-on: macos-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ffi-

      - name: Install cmake (required by llama-cpp-sys)
        run: brew install cmake

      - name: Build oxcer_ffi dylib (release)
        run: cargo build --release -p oxcer_ffi

      - name: Generate fresh Swift bindings
        run: |
          mkdir -p /tmp/uniffi_fresh
          cargo run --bin uniffi-bindgen -- generate \
            --library target/release/liboxcer_ffi.dylib \
            --language swift \
            --out-dir /tmp/uniffi_fresh

      - name: Compare fresh bindings against committed file
        run: |
          COMMITTED=apps/OxcerLauncher/OxcerLauncher/oxcer_ffi.swift
          FRESH=/tmp/uniffi_fresh/oxcer_ffi.swift

          if ! diff -q "$FRESH" "$COMMITTED" > /dev/null 2>&1; then
            echo ""
            echo "ERROR: FFI bindings are STALE."
            echo "  The committed Swift bindings do not match what uniffi-bindgen"
            echo "  would produce from the current Rust source."
            echo ""
            echo "  Fix: run ./scripts/regen-ffi.sh and commit both generated files."
            echo ""
            diff "$FRESH" "$COMMITTED" || true
            exit 1
          fi
          echo "OK: UniFFI Swift bindings match the Rust source."

      - name: Verify checksum is non-zero (sanity check)
        run: |
          COMMITTED=apps/OxcerLauncher/OxcerLauncher/oxcer_ffi.swift
          CHECKSUM=$(grep 'checksum_func_list_workspaces' "$COMMITTED" | grep -oE '[0-9]+' | head -1)
          if [ -z "$CHECKSUM" ] || [ "$CHECKSUM" -eq 0 ]; then
            echo "ERROR: Could not extract a non-zero checksum from $COMMITTED"
            exit 1
          fi
          echo "OK: list_workspaces checksum in committed bindings: $CHECKSUM"
