name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install pnpm CLI
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      # Setup Node.js and enable pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install

      # Setup Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 1) Rust workspace checks (core + tauri)
      - name: Cargo check (workspace)
        run: cargo check --workspace

      - name: Cargo test (oxcer-core only)
        run: cargo test -p oxcer-core

      # 2) Build minimal dist shell
      - name: Build dist shell
        run: pnpm build

      # 3) Tauri app check (no release artifacts, just compilation)
      - name: Cargo check (src-tauri)
        working-directory: src-tauri
        run: cargo check
