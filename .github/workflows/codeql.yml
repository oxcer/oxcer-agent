name: CodeQL

# Languages analyzed in this repository:
#
#   swift  — OxcerLauncher (macOS SwiftUI app in apps/OxcerLauncher/)
#
# NOTE: Rust is not supported by CodeQL. For Rust dependency vulnerability
# scanning, use `cargo audit` (the RustSec advisory database). A minimal
# setup:
#
#   cargo install cargo-audit
#   cargo audit
#
# or add a scheduled GitHub Actions job:
#   uses: actions-rust-lang/audit@v1
#
# See: https://rustsec.org

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run once a week (Monday 06:15 UTC) so new CVEs are caught even when
    # the codebase hasn't changed.
    - cron: '15 6 * * 1'

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results to GitHub

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # ── Pre-build: Rust dylib ─────────────────────────────────────────────
      #
      # CodeQL's autobuild will try to compile OxcerLauncher via Xcode.
      # The Xcode target links against liboxcer_ffi.dylib, so that dylib
      # must exist before autobuild runs — otherwise the build fails and
      # CodeQL produces no results.

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-codeql

      - name: Install cmake (required by llama-cpp-sys)
        run: brew install cmake

      - name: Build oxcer_ffi dylib (required by OxcerLauncher)
        run: cargo build --locked --release -p oxcer_ffi

      # ── CodeQL analysis ───────────────────────────────────────────────────

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      # Explicit xcodebuild replaces autobuild.  Two reasons to use Debug:
      #
      # 1. autobuild invoked `xcodebuild -target` (no -destination), which caused
      #    Xcode to attempt a multi-arch build including x86_64.  With -scheme
      #    and -destination 'platform=macOS', Xcode respects ONLY_ACTIVE_ARCH.
      #
      # 2. The Release configuration in project.pbxproj does NOT set
      #    ONLY_ACTIVE_ARCH, so Xcode builds a universal binary for Release and
      #    the x86_64 linker step fails ("symbol(s) not found for architecture
      #    x86_64") because the Rust dylib only contains the runner's native arch.
      #    The Debug configuration already has ONLY_ACTIVE_ARCH = YES baked in at
      #    both the project and target level — matching what the regular CI job
      #    uses — so it never attempts an x86_64 slice.
      #
      # CodeQL analysis quality is identical for Debug vs Release.
      - name: Build OxcerLauncher (for CodeQL)
        run: |
          xcodebuild \
            -project apps/OxcerLauncher/OxcerLauncher.xcodeproj \
            -scheme OxcerLauncher \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:swift
