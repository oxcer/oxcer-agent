name: Feature request
description: >
  Suggest a new capability or improvement. Oxcer is designed to stay simple
  for non-developer users — the best feature requests are small, composable,
  and solve a specific real task.
title: "[Feature] "
labels: [enhancement, needs-triage]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share this idea.

        A few things that make a feature request easy to act on:

        - **Be specific about the task, not just the feature.** "I want to summarize
          multiple files at once because I have 20 monthly reports" is more actionable
          than "add batch mode."
        - **Prefer small and composable.** A change that does one thing well fits
          Oxcer's design better than a large redesign.
        - **Check the [roadmap](../../blob/main/ROADMAP.md)** — your idea may already
          be planned for an upcoming milestone.

  # ── Problem / use case ───────────────────────────────────────────────────

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: >
        What task are you trying to accomplish? Describe the situation where
        Oxcer currently falls short, from your perspective as a user.
        Don't worry about describing a solution yet — just the problem.
      placeholder: |
        e.g. "I have 20 monthly expense reports in Downloads. Right now I have to
        ask Oxcer to summarize each one individually, which takes a long time. I'd
        like to get a single overview across all of them."
    validations:
      required: true

  # ── Proposed solution ─────────────────────────────────────────────────────

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        Your best idea for how this could work. This doesn't have to be
        technically complete — a description of the user-facing behaviour
        is enough.
      placeholder: |
        e.g. "Let me type something like 'summarize all expense reports in
        Downloads' and have Oxcer produce one combined summary."
    validations:
      required: true

  # ── Alternatives ──────────────────────────────────────────────────────────

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: >
        Other approaches you thought about, and why you prefer your proposed
        solution. Optional, but helpful for evaluating trade-offs.
      placeholder: |
        e.g. "I could run Oxcer 20 times and manually combine the output, but
        that loses the cross-document context."
    validations:
      required: false

  # ── UX constraints ────────────────────────────────────────────────────────

  - type: textarea
    id: ux
    attributes:
      label: UX constraints
      description: >
        Anything the implementation should keep in mind for non-developer users.
        Oxcer is designed to feel like talking to a knowledgeable assistant, not
        configuring a tool.
      placeholder: |
        e.g. "Should work without any new settings or configuration — the user
        just describes what they want in plain English."
    validations:
      required: false

  # ── Privacy / safety considerations ──────────────────────────────────────

  - type: checkboxes
    id: privacy-flag
    attributes:
      label: Privacy / safety considerations
      description: >
        Oxcer's core promise is that nothing leaves your machine. Check any
        boxes that apply to your feature request.
      options:
        - label: >
            This feature would change what files or data Oxcer reads or writes.
          required: false
        - label: >
            This feature involves network access or external services.
          required: false
        - label: >
            This feature changes how the model is invoked or what content is sent to it.
          required: false

  - type: textarea
    id: privacy-details
    attributes:
      label: Privacy / safety notes
      description: >
        If you checked any boxes above, describe the data-handling implications.
        If the feature requires network access, explain why that's necessary and
        what you'd expect to be sent where.

        Features that require network access need strong justification — Oxcer is
        deliberately offline-first. See the [network access policy](../../blob/main/CONTRIBUTING.md#network-access-policy).
      placeholder: |
        e.g. "Multi-file summarization stays fully local — it just reads more
        files from the configured workspace. No new network calls needed."
    validations:
      required: false
